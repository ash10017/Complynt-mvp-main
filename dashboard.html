<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complynt Dashboard</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <nav class="app-nav">
    <a class="app-nav-logo" href="dashboard.html">Complynt</a>
    <div class="app-nav-tabs">
      <a href="dashboard.html" class="app-nav-tab active">Compliance</a>
      <a href="people.html"    class="app-nav-tab">People</a>
    </div>
    <div class="app-nav-end">
      <span id="user-email" class="app-nav-user"></span>
      <button id="logout-btn" class="btn small">Log out</button>
    </div>
  </nav>

  <div id="alert-bar" class="alert hidden"></div>

  <main class="app-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Compliance</h1>
        <p class="page-sub">Your licences &amp; filings, all in one place</p>
      </div>
      <div class="section-actions">
        <input id="search" class="search-input" type="text" placeholder="Search…" />
        <select id="filter" class="filter-select">
          <option value="">All Categories</option>
          <option value="Food Safety">Food Safety</option>
          <option value="Liquor">Liquor</option>
          <option value="Local Authority">Local Authority</option>
          <option value="Fire">Fire</option>
          <option value="Tax">Tax</option>
        </select>
      </div>
    </div>

    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>

    <div id="compliance-list" class="card-grid"></div>
  </main>

  <!-- Compliance Detail Modal -->
  <div id="compliance-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" id="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <p id="modal-description"></p>
        <ul id="modal-documents"></ul>

        <h4 style="margin:16px 0 8px;font-size:13px;font-weight:600;">Upload Documents</h4>
        <input id="file-input" type="file" />
        <button id="upload-btn" class="btn small" style="margin-top:8px;">Upload</button>

        <h4 style="margin:16px 0 8px;font-size:13px;font-weight:600;">History</h4>
        <ul id="modal-history"></ul>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-right">
          <button id="done-btn" class="btn primary">Mark as Done</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="firebase-setup.js"></script>
  <script src="data/compliances.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
